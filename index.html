}

  border-radius:8px;

}

  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px 14px;
  margin-top:10px;
}
.favorite-item{

  align-items:flex-start;
  gap:8px;
  font-size:14px;
}

}
button{

  color:#fff;

  border-radius:12px;

.subbutton{

}

}
.warn{

  border:1px solid #f3d98b;

}
.tag{

  color:#fff;

  border-radius:20px;
  margin:5px 5px 0 0;
  font-size:14px;
}

}

.sectiontitle{

.note{

.small{

function yen(num){
  return "約" + Math.round(num).toLocaleString("ja-JP") + "円";
}

function infliximabCost(weight){
  const wt = (weight && weight > 0) ? weight : 60;
  const vials = Math.ceil((wt * 5) / 100);
  const oneInfusion = vials * 51351;
  const every8WeeksEquivalent28d = oneInfusion / 2;
  return {
    cost: every8WeeksEquivalent28d,
    text: yen(every8WeeksEquivalent28d) + " / 28日（5mg/kgを8週ごと維持換算, " + wt + "kg想定）"
  };
}

function getCostInfo(name, weight){
  if(name === "インフリキシマブ"){
    return infliximabCost(weight);
  }
  const d = DRUGS[name];
  if(!d) return { cost: 999999, text: "概算未設定" };
  return { cost: d.defaultCost, text: d.costText };
}

function showWarning(messages){
  const warnBox = document.getElementById("warnBox");
  if(!messages.length){
    warnBox.style.display = "none";
    warnBox.innerHTML = "";
    return;
  }
  warnBox.style.display = "block";
  warnBox.innerHTML = "<b>確認事項</b><br>" + messages.join("<br>");
}

  return Array.from(document.querySelectorAll(".favDrug:checked")).map(el => el.value);
}

  const fams = [];
  favorites.forEach(name => {
    if(DRUGS[name] && DRUGS[name].family && !fams.includes(DRUGS[name].family)){
      fams.push(DRUGS[name].family);
    }
  });
  return fams;
}

function calc(){
  const ageRaw = document.getElementById("age").value.trim();
  const wRaw = document.getElementById("w").value.trim();

  const age = ageRaw === "" ? null : parseInt(ageRaw, 10);
  const weight = wRaw === "" ? null : parseFloat(wRaw);

  const activity = document.getElementById("activity").value;
  const extent = document.getElementById("extent").value;
  const mayo = parseInt(document.getElementById("mayo").value, 10);

  const fail5asa = document.getElementById("fail5asa").checked;
  const steroidDep = document.getElementById("steroidDep").checked;
  const steroidRef = document.getElementById("steroidRef").checked;
  const fast = document.getElementById("fast").checked;
  const oral = document.getElementById("oral").checked;

  const antiTnffail = document.getElementById("antiTnffail").checked;
  const vedofail = document.getElementById("vedofail").checked;
  const ustefail = document.getElementById("ustefail").checked;
  const jakfail = document.getElementById("jakfail").checked;
  const s1pfail = document.getElementById("s1pfail").checked;
  const localfail = document.getElementById("localfail").checked;

  const highInfectionRisk = document.getElementById("highInfectionRisk").checked;
  const cvRisk = document.getElementById("cvRisk").checked;
  const smoke = document.getElementById("smoke").checked;
  const pregnancyRisk = document.getElementById("pregnancyRisk").checked;

  const favoriteDrugs = getFavoriteDrugs();
  const favoriteFamilies = getFavoriteFamilies(favoriteDrugs);

  const warnings = [];
  if(age === null) warnings.push("・年齢は未入力です");
  if(weight === null) warnings.push("・体重は未入力です（体重依存薬は60kg換算で概算表示）");
  if(age !== null && age <= 0) warnings.push("・年齢は正の値で入力してください");
  if(weight !== null && weight <= 0) warnings.push("・体重は正の値で入力してください");

  const candidates = [];
  const cautions = [];
  const summary = [];

  function addCaution(text){
    if(!cautions.includes(text)) cautions.push(text);
  }

  function addSummary(text){
    if(!summary.includes(text)) summary.push(text);
  }

  function isFavoriteExact(name){
    return favoriteDrugs.includes(name);
  }

  function isFavoriteFamily(name){
    return DRUGS[name] && favoriteFamilies.includes(DRUGS[name].family);
  }

  function addDrug(name, bucket, route, reason, score){
    if(candidates.some(x => x.name === name)) return;

    const fam = DRUGS[name] ? DRUGS[name].family : "";
    let finalScore = score || 0;

    if(isFavoriteExact(name)){
      finalScore += 60;
    } else if(isFavoriteFamily(name)){
      finalScore += 20;
    }

    if(pregnancyRisk){
      if(name === "エトラシモド") finalScore -= 1000;
      if(name === "オザニモド") finalScore -= 120;
      if(name === "ウパダシチニブ" || name === "トファシチニブ" || name === "フィルゴチニブ"){
        finalScore -= 80;
      }
    }

    const costInfo = getCostInfo(name, weight);
    candidates.push({
      name,
      family: fam,
      bucket,
      route,
      reason,
      score: finalScore,
      cost: costInfo.cost,
      costText: costInfo.text,
      contraindications: DRUGS[name]?.contraindications || ["要電子添文確認"],
      adverse: DRUGS[name]?.adverse || ["要電子添文確認"],
      duration: DRUGS[name]?.duration || "要電子添文確認"
    });
  }

  if(cvRisk || smoke || (age !== null && age >= 65)){
    addCaution("JAK阻害薬は血栓・心血管リスクを再確認");
  }
  if(highInfectionRisk){
    addCaution("感染リスクが高い場合は全身免疫抑制の強い薬を慎重に評価");
  }
  if(pregnancyRisk){
    addCaution("妊娠中/妊娠可能性ありではS1P、とくにエトラシモドは回避方向");
  }

  if(activity === "mild"){
    addSummary("軽症では5-ASA中心、遠位病変では局所製剤を優先");
    addDrug("経口5-ASA", "基本治療", "内服", "軽症の基本軸", 50);

    if((extent === "rectum" || extent === "left") && !localfail){
      addDrug("メサラジン坐剤", "局所5-ASA", "局所", "直腸炎型で優先しやすい", 95);
      addDrug("メサラジン注腸", "局所5-ASA", "局所", "左側病変まで含めて使いやすい", 92);
      addDrug("レクタブル", "局所ステロイド", "局所", "局所5-ASAで不十分なら追加候補", 88);
    }

    if(fail5asa || mayo >= 2){
      addDrug("コレチメント", "追加治療", "内服", "5-ASAで不十分な軽〜中等症候補", 82);
    }
  }

  if(activity === "moderate"){
    addSummary("中等症では局所/5-ASAで不十分ならadvanced therapyも早期検討");
    addDrug("経口5-ASA", "基本治療", "内服", "併用の土台", 45);

    if((extent === "rectum" || extent === "left") && !localfail){
      addDrug("メサラジン注腸", "局所5-ASA", "局所", "遠位病変ではなお有用", 75);
      addDrug("レクタブル", "局所ステロイド", "局所", "遠位優位で追加候補", 72);
    }

    if(!steroidDep && !steroidRef && !oral){
      addDrug("コレチメント", "ステロイド", "内服", "軽〜中等症寄りなら候補", 62);
    }

    if(fail5asa){
      addDrug("カログラ", "内服分子標的", "内服", "5-ASA不十分の中等症に適応が合いやすい", 80);
    }
  }

  if(activity === "moderate" || activity === "severe"){
    if(!jakfail && !cvRisk && !highInfectionRisk){
      if(fast || steroidDep || steroidRef){
        addDrug("ウパダシチニブ", "JAK阻害薬", "内服", "即効性重視・ステロイド依存/抵抗で有力", 98);
        addDrug("トファシチニブ", "JAK阻害薬", "内服", "即効性重視のJAK候補", 92);
        addDrug("フィルゴチニブ", "JAK阻害薬", "内服", "内服JAK候補", 88);
      } else if(oral){
        addDrug("ウパダシチニブ", "JAK阻害薬", "内服", "内服希望の有力候補", 90);
        addDrug("フィルゴチニブ", "JAK阻害薬", "内服", "内服希望のJAK候補", 85);
        addDrug("トファシチニブ", "JAK阻害薬", "内服", "内服希望のJAK候補", 84);
      }
    } else if(cvRisk || highInfectionRisk){
      addCaution("JAK阻害薬は今回の入力では優先度を下げています");
    }

    if(oral && !s1pfail){
      addDrug("オザニモド", "S1P調節薬", "内服", "内服希望の候補", 78);
      addDrug("エトラシモド", "S1P調節薬", "内服", "内服希望の候補", 79);
    }

    if(highInfectionRisk){
      if(!vedofail) addDrug("ベドリズマブ", "生物学的製剤", "皮下注/点滴", "安全性を重視しやすい", 94);
      if(!ustefail) addDrug("ウステキヌマブ", "生物学的製剤", "点滴→皮下注", "機序変更候補", 82);
    } else {
      if(!vedofail) addDrug("ベドリズマブ", "生物学的製剤", "皮下注/点滴", "腸管選択性を重視", 86);
      if(!ustefail) addDrug("ウステキヌマブ", "生物学的製剤", "点滴→皮下注", "機序変更候補", 81);
      addDrug("ミリキズマブ", "IL-23製剤", "点滴→皮下注", "機序変更候補", 83);
    }

    if(!antiTnffail){
      addDrug("インフリキシマブ", "抗TNF", "点滴", "重めの病勢や速い鎮静化を狙う候補", 89);
      addDrug("アダリムマブ", "抗TNF", "皮下注", "自己注射で運用しやすい", 76);
      addDrug("ゴリムマブ", "抗TNF", "皮下注", "4週ごと維持の選択肢", 74);
    }
  }

  if(antiTnffail){
    addSummary("抗TNF不応後は機序変更を優先");
    if(!vedofail) addDrug("ベドリズマブ", "生物学的製剤", "皮下注/点滴", "抗TNF後の機序変更候補", 96);
    if(!ustefail) addDrug("ウステキヌマブ", "生物学的製剤", "点滴→皮下注", "抗TNF後の機序変更候補", 92);
    addDrug("ミリキズマブ", "IL-23製剤", "点滴→皮下注", "抗TNF後の機序変更候補", 93);

    if(!jakfail && !cvRisk && !highInfectionRisk){
      addDrug("ウパダシチニブ", "JAK阻害薬", "内服", "抗TNF後の機序変更候補", 99);
      addDrug("トファシチニブ", "JAK阻害薬", "内服", "抗TNF後の機序変更候補", 91);
      addDrug("フィルゴチニブ", "JAK阻害薬", "内服", "抗TNF後の機序変更候補", 89);
    }
  }

  if(activity === "asuc"){
    addSummary("急性重症は外来自己判断用ではなく入院管理が前提");
    addCaution("急性重症では外来ツールよりも入院下評価・感染除外・外科連携が必要");
    addDrug("インフリキシマブ", "救済治療", "点滴", "急性重症の救済候補として用いられる", 120);
  }

  candidates.sort((a, b) => {
    if (b.score !== a.score) return b.score - a.score;
    return a.cost - b.cost;
  });

  const top = candidates.slice(0, 5);

  let html = "<div class='sectiontitle'>候補治療（上位5つ）</div>";

  if(top.length === 0){
    html += "条件に合う候補が抽出されませんでした。入力を見直してください。";
  } else {
    top.forEach((c, idx) => {
      html += "<div class='drugblock'>";
      html += "<div class='tag'>#" + (idx + 1) + " " + c.name + "</div> ";
      html += "<span class='graytag'>" + c.bucket + "</span> ";
      if (isFavoriteExact(c.name)) {
        html += "<span class='goldtag'>お気に入り一致</span> ";
      } else if (isFavoriteFamily(c.name)) {
        html += "<span class='goldtag'>同系統優先</span> ";
      }
      if (pregnancyRisk && c.name === "エトラシモド") {
        html += "<span class='redtag'>禁忌注意</span>";
      }
      html += "<br>";
      html += "<b>投与経路:</b> " + c.route + "<br>";
      html += "<b>理由:</b> " + c.reason + "<br>";
      html += "<b>薬剤費概算:</b> " + c.costText + "<br>";

      html += "<div class='small'><b>禁忌・回避の目安:</b><ul class='tight'>";
      c.contraindications.forEach(item => {
        html += "<li>" + item + "</li>";
      });
      html += "</ul></div>";

      html += "<div class='small'><b>主な副作用:</b><ul class='tight'>";
      c.adverse.forEach(item => {
        html += "<li>" + item + "</li>";
      });
      html += "</ul></div>";

      html += "<div class='small'><b>投薬期間メモ:</b> " + c.duration + "</div>";
      html += "</div>";
    });
  }

  html += "<hr><div class='sectiontitle'>整理メモ</div>";
  html += (summary.length ? summary.map(x => "・" + x).join("<br>") : "・標準的な整理のみ");

  html += "<hr><div class='sectiontitle'>全体注意</div>";
  html += (cautions.length ? cautions.map(x => "・" + x).join("<br>") : "・特記事項なし");

  html += "<hr>";
  html += "体重: " + (weight !== null ? weight + "kg" : "未入力（60kg換算を使用）") + "<br>";
  html += "病勢: " + (
    activity === "mild" ? "軽症" :
    activity === "moderate" ? "中等症" :
    activity === "severe" ? "重症" :
    "急性重症"
  ) + "<br>";
  html += "病変範囲: " + (
    extent === "rectum" ? "直腸炎型" :
    extent === "left" ? "左側大腸炎型" :
    "全大腸炎型"
  ) + "<br>";
  html += "Mayo: " + mayo + "<br>";
  html += "お気に入り: " + (favoriteDrugs.length ? favoriteDrugs.join(" / ") : "なし") + "<br>";
  html += "<div class='note'>※個人用の簡易整理ツールです。禁忌・副作用は簡略表示です。実臨床では感染評価、CMV/C. difficile、結核/HBV、妊娠、ワクチン、心血管・血栓リスク、眼科/心電図評価、保険適応、電子添文を必ず確認してください。</div>";

  document.getElementById("out").innerHTML = html;
  showWarning(warnings);

  let copyText = "UC治療候補＋複数お気に入り＋安全性表示\n\n";

  if(warnings.length){
    copyText += "【確認事項】\n" + warnings.map(x => x.replace("・","")).join("\n") + "\n\n";
  }

  copyText += "【候補治療（上位5つ）】\n";
  top.forEach((c, i) => {
    copyText += (i + 1) + ". " + c.name + " [" + c.bucket + "]\n";
    copyText += "投与経路: " + c.route + "\n";
    copyText += "理由: " + c.reason + "\n";
    copyText += "薬剤費概算: " + c.costText + "\n";
    copyText += "禁忌・回避の目安: " + c.contraindications.join(" / ") + "\n";
    copyText += "主な副作用: " + c.adverse.join(" / ") + "\n";
    copyText += "投薬期間メモ: " + c.duration + "\n";
    if (isFavoriteExact(c.name)) {
      copyText += "お気に入り一致: はい\n";
    } else if (isFavoriteFamily(c.name)) {
      copyText += "同系統優先: はい\n";
    }
    copyText += "\n";
  });

  copyText += "【整理メモ】\n";
  copyText += (summary.length ? summary.map(x => "・" + x).join("\n") : "・標準的な整理のみ") + "\n\n";

  copyText += "【全体注意】\n";
  copyText += (cautions.length ? cautions.map(x => "・" + x).join("\n") : "・特記事項なし") + "\n\n";

  copyText += "体重: " + (weight !== null ? weight + "kg" : "未入力（60kg換算を使用）") + "\n";
  copyText += "病勢: " + (
    activity === "mild" ? "軽症" :
    activity === "moderate" ? "中等症" :
    activity === "severe" ? "重症" :
    "急性重症"
  ) + "\n";
  copyText += "病変範囲: " + (
    extent === "rectum" ? "直腸炎型" :
    extent === "left" ? "左側大腸炎型" :
    "全大腸炎型"
  ) + "\n";
  copyText += "Mayo: " + mayo + "\n";
  copyText += "お気に入り: " + (favoriteDrugs.length ? favoriteDrugs.join(" / ") : "なし") + "\n";

  lastCopyText = copyText;
}

function copyResult(){
  const copyMsg = document.getElementById("copyMsg");
  if(!lastCopyText){
    copyMsg.style.display = "block";
    copyMsg.style.color = "#ff3b30";
    copyMsg.textContent = "先に候補を表示してください";
    setTimeout(() => {
      copyMsg.style.display = "none";
      copyMsg.style.color = "#34c759";
    }, 2000);
    return;
  }

  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(lastCopyText).then(() => {
      copyMsg.style.display = "block";
      copyMsg.style.color = "#34c759";
      copyMsg.textContent = "コピーしました";
      setTimeout(() => { copyMsg.style.display = "none"; }, 2000);
    }).catch(() => fallbackCopy());
  } else {
    fallbackCopy();
  }
}

function fallbackCopy(){
  const copyMsg = document.getElementById("copyMsg");
  const ta = document.createElement("textarea");
  ta.value = lastCopyText;
  document.body.appendChild(ta);
  ta.select();
  ta.setSelectionRange(0, 99999);

  try{
    document.execCommand("copy");
    copyMsg.style.display = "block";
    copyMsg.style.color = "#34c759";
    copyMsg.textContent = "コピーしました";
  }catch(e){
    copyMsg.style.display = "block";
    copyMsg.style.color = "#ff3b30";
    copyMsg.textContent = "コピーに失敗しました";
  }

  document.body.removeChild(ta);
  setTimeout(() => {
    copyMsg.style.display = "none";
    copyMsg.style.color = "#34c759";
  }, 2000);
}
</script>
